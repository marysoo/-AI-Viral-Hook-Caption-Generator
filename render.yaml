services:
  - type: web
    name: viral-ai-engine
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: APP_URL
        sync: false
