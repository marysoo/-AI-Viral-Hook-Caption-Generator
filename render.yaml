services:
  - type: web
    name: viral-ai-web
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false

  - type: worker
    name: viral-ai-bot
    env: python
    buildCommand: pip install python-telegram-bot requests
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_URL
        value: https://viral-ai-web.onrender.com/api/generate
